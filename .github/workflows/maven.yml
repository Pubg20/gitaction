name: CICD with gitAction

on:
  push:
    branches: [ "main" ]


jobs:
  complie:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn package
  security-check:
    runs-on: ubuntu-latest
    needs: complie
    steps:
    - uses: actions/checkout@v4
    - name: install trivy
      run: |
        sudo apt-get install wget gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -y
        sudo apt-get install trivy -y
    - name: trivy scan
      run: trivy fs . --scanners vuln,secret,misconfig --format table -o fs-report.json
  security-scan:
    runs-on: ubuntu-latest
    needs: security-check
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks install 
        run: sudo apt install gitleaks -y
      - name: run gitleaks
        run: gitleaks detect source . -r gitleaks-report.json -f json
  sonar-scan:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7.1.0 # Ex: v4.1.0 or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
      env:
        SONAR_TOKEN: ${{ secrets.SONARTOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
  
    
